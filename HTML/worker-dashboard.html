<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks - Sales Department</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/worker.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-left">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
      <a class="navbar-brand" href="worker-dashboard.html">
        <div class="navbar-logo">SD</div>
        <span class="navbar-title">Sales Department</span>
      </a>
    </div>
    <div class="navbar-actions">
      <div class="navbar-avatar" id="nav-avatar" onclick="logout()" title="Logout"></div>
    </div>
  </nav>

  <div class="layout">

    <aside class="sidebar" id="sidebar">
      <span class="sidebar-label">Main</span>
      <a class="sidebar-item active" href="worker-dashboard.html">
        <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        My Tasks
      </a>
      <span class="sidebar-label">Account</span>
      <a class="sidebar-item" href="#" onclick="logout()">
        <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </a>
    </aside>

    <main class="main">
      <div class="page-header">
        <h2 id="welcome-msg">My Tasks</h2>
        <p>Feedback tasks assigned by your manager.</p>
      </div>

      <div class="stats-row" style="max-width:480px;">
        <div class="stat-card purple">
          <span class="stat-label">Pending</span>
          <span class="stat-value" id="stat-pending">0</span>
          <span class="stat-sub">Need your feedback</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Completed</span>
          <span class="stat-value" id="stat-done">0</span>
          <span class="stat-sub">Submitted</span>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('pending', this)">Pending</button>
        <button class="tab" onclick="showTab('done', this)">Completed</button>
      </div>

      <div class="task-list" id="task-list"></div>

    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/worker.js"></script>
  <script>initWorkerDashboard();</script>
</body>
</html>
